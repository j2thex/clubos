name: Telegram Deploy Notification
on:
  deployment_status:
jobs:
  notify:
    if: >
      github.event.deployment_status.state == 'success' &&
      (github.event.deployment.environment == 'Production' || github.event.deployment.environment == 'Preview')
    runs-on: ubuntu-latest
    steps:
      - name: Fetch commit message
        id: commit
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.deployment.sha,
            });
            core.setOutput('message', data.commit.message);
            core.setOutput('author', data.commit.author.name);
      - name: Send Telegram notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message_thread_id: ${{ github.event.deployment.environment == 'Production' && secrets.TELEGRAM_THREAD_PROD || secrets.TELEGRAM_THREAD_STAGING }}
          message: |
            ${{ github.event.deployment.environment == 'Production' && '🚀 Production' || '🧪 Staging' }} Deploy ready

            ${{ steps.commit.outputs.message }}

            by ${{ steps.commit.outputs.author }}
            ${{ github.event.deployment_status.environment_url || github.event.deployment_status.target_url }}
