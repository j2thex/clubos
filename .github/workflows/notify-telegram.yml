name: Telegram Deploy Notification
on:
  deployment_status:
jobs:
  notify:
    if: >
      github.event.deployment_status.state == 'success' &&
      (startsWith(github.event.deployment.environment, 'Production') ||
       startsWith(github.event.deployment.environment, 'Preview'))
    runs-on: ubuntu-latest
    steps:
      - name: Fetch commit message
        id: commit
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.deployment.sha,
            });
            core.setOutput('message', data.commit.message);
            core.setOutput('author', data.commit.author.name);
      - name: Send Telegram notification
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          THREAD_ID: ${{ startsWith(github.event.deployment.environment, 'Production') && secrets.TELEGRAM_THREAD_PROD || secrets.TELEGRAM_THREAD_STAGING }}
          HEADER: ${{ startsWith(github.event.deployment.environment, 'Production') && '🚀 Production' || '🧪 Staging' }}
          COMMIT_MSG: ${{ steps.commit.outputs.message }}
          AUTHOR: ${{ steps.commit.outputs.author }}
          URL: ${{ github.event.deployment_status.environment_url || github.event.deployment_status.target_url }}
        run: |
          TEXT="$HEADER Deploy ready

          $COMMIT_MSG

          by $AUTHOR
          $URL"
          curl -sS -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT_ID}" \
            --data-urlencode "message_thread_id=${THREAD_ID}" \
            --data-urlencode "text=${TEXT}"
